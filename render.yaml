# Example Render configuration. You will need to adjust this for the different services you run.
previews:
  generation: manual
  expireAfterDays: 3
services:
  - type: web
    repo: https://github.com/nativeapptemplate/nativeapptemplateapi
    name: nativeapptemplateapi
    plan: starter
    previews:
      plan: starter
    env: ruby
    region: singapore # the region must be consistent across all services for the internal keys to be read
    buildCommand: "./bin/render-build.sh"
    startCommand: "./bin/render-start.sh"
    initialDeployHook: "./bin/render-seed.sh"
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 1
      - key: DATABASE_URL
        fromDatabase:
          name: nativeapptemplateapi
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis
          property: connectionString
      - fromGroup: nativeapptemplateapi-env

  - type: redis
    name: redis
    plan: starter # optional (defaults to starter)
    previewPlan: starter
    region: singapore # the region must be consistent across all services for the internal keys to be read
    ipAllowList: [] # only allow internal connections
    maxmemoryPolicy: noeviction # optional (defaults to allkeys-lru)

  - type: worker
    name: sidekiq-worker
    plan: starter # no free option for bg workers
    previews:
      plan: starter
    env: ruby
    region: singapore # the region must be consistent across all services for the internal keys to be read
    buildCommand: "./bin/render-build-worker.sh --skip-migrations"
    startCommand: "./bin/render-start-sidekiq.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nativeapptemplateapi
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis
          type: redis
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - fromGroup: nativeapptemplateapi-env

databases:
  - name: nativeapptemplateapi
    plan: basic-256mb
    previewPlan: basic-256mb
    region: singapore # the region must be consistent across all services for the internal keys to be read
    ipAllowList: [] # only allow internal connections
    diskSizeGB: 1
    # databaseName: nativeapptemplateapi
    # user: nativeapptemplateapi
    # ipAllowList: [] # only allow internal connections

