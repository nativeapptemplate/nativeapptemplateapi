<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <!-- Palette 9: Friendly - Light Blue Vivid (Primary) -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2933"/>
      <stop offset="100%" stop-color="#0B69A3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#40C3F7"/>
      <stop offset="100%" stop-color="#2BB0ED"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <circle cx="1050" cy="180" r="180" fill="#40C3F7" opacity="0.22"/>
  <circle cx="1150" cy="450" r="140" fill="#5ED0FA" opacity="0.15"/>

  <rect x="0" y="0" width="1280" height="6" fill="url(#accent)"/>

  <!-- Now Open Source badge -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="240" height="44" rx="22" fill="#127FBF"/>
    <text x="120" y="30" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="700" fill="#E3F8FF" text-anchor="middle">★ NOW OPEN SOURCE</text>
  </g>

  <!-- Title -->
  <text x="80" y="240" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="76" font-weight="800" fill="#F5F7FA" letter-spacing="-2">NativeAppTemplate</text>
  <text x="80" y="310" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="700" fill="url(#accent)" letter-spacing="-1">API</text>

  <!-- Tagline -->
  <text x="80" y="390" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="30" font-weight="400" fill="#CBD2D9">Rails 8.1 API backend for native</text>
  <text x="80" y="432" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="30" font-weight="400" fill="#CBD2D9">iOS + Android mobile apps</text>

  <!-- Tech pills -->
  <g transform="translate(80, 500)" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="600">
    <g>
      <rect x="0" y="0" width="90" height="44" rx="22" fill="#323F4B" stroke="#52606D" stroke-width="1"/>
      <text x="45" y="29" fill="#F5F7FA" text-anchor="middle">Rails</text>
    </g>
    <g transform="translate(105, 0)">
      <rect x="0" y="0" width="160" height="44" rx="22" fill="#323F4B" stroke="#52606D" stroke-width="1"/>
      <text x="80" y="29" fill="#F5F7FA" text-anchor="middle">PostgreSQL</text>
    </g>
    <g transform="translate(280, 0)">
      <rect x="0" y="0" width="80" height="44" rx="22" fill="#323F4B" stroke="#52606D" stroke-width="1"/>
      <text x="40" y="29" fill="#F5F7FA" text-anchor="middle">iOS</text>
    </g>
    <g transform="translate(375, 0)">
      <rect x="0" y="0" width="130" height="44" rx="22" fill="#323F4B" stroke="#52606D" stroke-width="1"/>
      <text x="65" y="29" fill="#F5F7FA" text-anchor="middle">Android</text>
    </g>
    <g transform="translate(520, 0)">
      <rect x="0" y="0" width="80" height="44" rx="22" fill="#323F4B" stroke="#52606D" stroke-width="1"/>
      <text x="40" y="29" fill="#F5F7FA" text-anchor="middle">MIT</text>
    </g>
  </g>

  <!-- Right visual: server/API stack feeding two devices -->
  <g transform="translate(880, 140)">
    <!-- Server card -->
    <g transform="translate(60, 0)">
      <rect x="0" y="0" width="200" height="110" rx="20" fill="url(#glass)" stroke="#40C3F7" stroke-width="2" stroke-opacity="0.5"/>
      <text x="100" y="50" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#F5F7FA" text-anchor="middle">Rails 8.1</text>
      <text x="100" y="78" font-family="-apple-system, sans-serif" font-size="16" font-weight="500" fill="#B3ECFF" text-anchor="middle">API · PostgreSQL</text>
    </g>

    <!-- Connection lines -->
    <line x1="110" y1="110" x2="70" y2="180" stroke="url(#accent)" stroke-width="2" opacity="0.7"/>
    <line x1="210" y1="110" x2="250" y2="180" stroke="url(#accent)" stroke-width="2" opacity="0.7"/>

    <!-- iOS device -->
    <g transform="translate(10, 180)">
      <rect x="0" y="0" width="120" height="180" rx="20" fill="#1F2933" stroke="#3E4C59" stroke-width="2"/>
      <rect x="8" y="8" width="104" height="164" rx="14" fill="#323F4B"/>
      <rect x="48" y="18" width="24" height="8" rx="4" fill="#0B69A3"/>
      <text x="60" y="105" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#40C3F7" text-anchor="middle">iOS</text>
    </g>

    <!-- Android device -->
    <g transform="translate(190, 180)">
      <rect x="0" y="0" width="120" height="180" rx="14" fill="#1F2933" stroke="#3E4C59" stroke-width="2"/>
      <rect x="8" y="8" width="104" height="164" rx="8" fill="#323F4B"/>
      <circle cx="60" cy="20" r="3" fill="#0B69A3"/>
      <text x="60" y="105" font-family="sans-serif" font-size="16" font-weight="700" fill="#40C3F7" text-anchor="middle">ANDROID</text>
    </g>
  </g>

  <!-- Footer URL — baseline at y=585 keeps text bottom inside the 40pt safe area -->
  <text x="80" y="585" font-family="SF Mono, Menlo, monospace" font-size="20" font-weight="500" fill="#7B8794">github.com/nativeapptemplate/nativeapptemplateapi</text>
</svg>
