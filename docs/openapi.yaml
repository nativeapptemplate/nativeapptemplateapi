openapi: 3.1.0
info:
  title: NativeAppTemplate API
  description: REST API for multi-tenant SaaS backend serving NativeAppTemplate iOS/Android mobile applications. Shopkeepers authenticate via token-based auth to manage shops and item tags.
  version: 1.0.0

servers:
  - url: /
    description: Shopkeeper Auth
  - url: /api/v1/shopkeeper
    description: Shopkeeper API

security:
  - tokenAuth: []

components:
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: access-token
      description: |
        Token-based authentication via devise_token_auth.
        Required headers: `access-token`, `client`, `uid`, `token-type: Bearer`.

  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
        error_message:
          type: string

    # --- Resources ---

    ShopAttributes:
      type: object
      properties:
        name:
          type: string
        description:
          type: ['string', 'null']
        time_zone:
          type: string
        item_tags_count:
          type: integer
        scanned_item_tags_count:
          type: integer
        completed_item_tags_count:
          type: integer
        display_shop_server_path:
          type: string

    Shop:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [shop]
        attributes:
          $ref: '#/components/schemas/ShopAttributes'
        relationships:
          type: object
          properties:
            account:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    type:
                      type: string
                      enum: [account]

    ItemTagAttributes:
      type: object
      properties:
        shop_id:
          type: string
          format: uuid
        queue_number:
          type: string
        state:
          type: string
          enum: [idled, completed]
        scan_state:
          type: string
          enum: [unscanned, scanned]
        customer_read_at:
          type: ['string', 'null']
          format: date-time
        completed_at:
          type: ['string', 'null']
          format: date-time
        already_completed:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        shop_name:
          type: string

    ItemTag:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [item_tag]
        attributes:
          $ref: '#/components/schemas/ItemTagAttributes'
        relationships:
          type: object
          properties:
            shop:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    type:
                      type: string
                      enum: [shop]

    AccountAttributes:
      type: object
      properties:
        name:
          type: string
        owner_id:
          type: string
          format: uuid
        personal:
          type: boolean
        is_admin:
          type: boolean
        owner_name:
          type: string
        accounts_shopkeepers_count:
          type: integer
        accounts_invitations_count:
          type: integer
        shops_count:
          type: integer

    Account:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [account]
        attributes:
          $ref: '#/components/schemas/AccountAttributes'
        relationships:
          type: object
          properties:
            owner:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    type:
                      type: string
                      enum: [shopkeeper]
            accounts_shopkeepers:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      type:
                        type: string
                        enum: [accounts_shopkeeper]
            accounts_invitations:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      type:
                        type: string
                        enum: [accounts_invitation]

    ShopkeeperAttributes:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        time_zone:
          type: string
        locale:
          type: string

    Shopkeeper:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [shopkeeper]
        attributes:
          $ref: '#/components/schemas/ShopkeeperAttributes'

    AccountsShopkeeperAttributes:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        shopkeeper_id:
          type: string
          format: uuid
        admin:
          type: boolean
        senior_manager:
          type: boolean
        junior_manager:
          type: boolean
        senior_member:
          type: boolean
        junior_member:
          type: boolean
        guest:
          type: boolean

    AccountsShopkeeper:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [accounts_shopkeeper]
        attributes:
          $ref: '#/components/schemas/AccountsShopkeeperAttributes'
        relationships:
          type: object
          properties:
            account:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    type:
                      type: string
                      enum: [account]
            shopkeeper:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    type:
                      type: string
                      enum: [shopkeeper]

    AccountsInvitationAttributes:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        invited_by_id:
          type: string
          format: uuid
        name:
          type: string
        token:
          type: string
        email:
          type: string
          format: email
        admin:
          type: boolean
        senior_manager:
          type: boolean
        junior_manager:
          type: boolean
        senior_member:
          type: boolean
        junior_member:
          type: boolean
        guest:
          type: boolean

    AccountsInvitation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [accounts_invitation]
        attributes:
          $ref: '#/components/schemas/AccountsInvitationAttributes'
        relationships:
          type: object
          properties:
            account:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    type:
                      type: string
                      enum: [account]
            invited_by:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    type:
                      type: string
                      enum: [shopkeeper]

    PermissionAttributes:
      type: object
      properties:
        name:
          type: string
        tag:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Permission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [permission]
        attributes:
          $ref: '#/components/schemas/PermissionAttributes'

    # --- Auth Resources ---

    ShopkeeperSignIn:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        uid:
          type: string
          format: email
        time_zone:
          type: string
        locale:
          type: string
        token:
          type: string
        client:
          type: string
        expiry:
          type: integer
        account_id:
          type: string
          format: uuid
        personal_account_id:
          type: string
          format: uuid
        account_owner_id:
          type: string
          format: uuid
        account_name:
          type: string

    # --- Request bodies ---

    ShopCreateRequest:
      type: object
      required: [shop]
      properties:
        shop:
          type: object
          required: [name, time_zone]
          properties:
            name:
              type: string
            description:
              type: string
            time_zone:
              type: string

    ShopUpdateRequest:
      type: object
      required: [shop]
      properties:
        shop:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            time_zone:
              type: string

    ItemTagCreateRequest:
      type: object
      required: [item_tag]
      properties:
        item_tag:
          type: object
          required: [queue_number]
          properties:
            queue_number:
              type: string

    ItemTagUpdateRequest:
      type: object
      required: [item_tag]
      properties:
        item_tag:
          type: object
          properties:
            queue_number:
              type: string

    AccountCreateRequest:
      type: object
      required: [account]
      properties:
        account:
          type: object
          required: [name]
          properties:
            name:
              type: string

    AccountUpdateRequest:
      type: object
      required: [account]
      properties:
        account:
          type: object
          properties:
            name:
              type: string

    AccountsShopkeeperUpdateRequest:
      type: object
      required: [accounts_shopkeeper]
      properties:
        accounts_shopkeeper:
          type: object
          properties:
            admin:
              type: boolean
            senior_manager:
              type: boolean
            junior_manager:
              type: boolean
            senior_member:
              type: boolean
            junior_member:
              type: boolean
            guest:
              type: boolean

    AccountsInvitationCreateRequest:
      type: object
      required: [accounts_invitation]
      properties:
        accounts_invitation:
          type: object
          required: [name, email]
          properties:
            name:
              type: string
            email:
              type: string
              format: email
            admin:
              type: boolean
            senior_manager:
              type: boolean
            junior_manager:
              type: boolean
            senior_member:
              type: boolean
            junior_member:
              type: boolean
            guest:
              type: boolean

    AccountsInvitationUpdateRequest:
      type: object
      required: [accounts_invitation]
      properties:
        accounts_invitation:
          type: object
          properties:
            name:
              type: string
            admin:
              type: boolean
            senior_manager:
              type: boolean
            junior_manager:
              type: boolean
            senior_member:
              type: boolean
            junior_member:
              type: boolean
            guest:
              type: boolean

    SignUpRequest:
      type: object
      required: [name, email, password, time_zone, current_platform]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        time_zone:
          type: string
        current_platform:
          type: string
          enum: [ios, android]

    SignInRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AccountUpdateAuthRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        time_zone:
          type: string

    ConfirmationRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ForgotPasswordRequest:
      type: object
      required: [email, redirect_url]
      properties:
        email:
          type: string
          format: email
        redirect_url:
          type: string

    ResetPasswordRequest:
      type: object
      required: [password, password_confirmation]
      properties:
        password:
          type: string
        password_confirmation:
          type: string

    PasswordUpdateRequest:
      type: object
      required: [shopkeeper]
      properties:
        shopkeeper:
          type: object
          required: [current_password, password, password_confirmation]
          properties:
            current_password:
              type: string
            password:
              type: string
            password_confirmation:
              type: string

    # --- Response wrappers ---

    JsonApiResponse:
      type: object
      properties:
        data:
          oneOf:
            - type: object
            - type: array
              items:
                type: object
        included:
          type: array
          items:
            type: object
        meta:
          type: object

    SuccessResponse:
      type: object
      properties:
        status:
          type: integer
          enum: [200]

    SuccessMessageResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

  responses:
    Unauthorized:
      description: Not authenticated or not authorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 401
            error_message: Unauthorized

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 404
            error_message: Not found

    Gone:
      description: Resource expired or no longer available
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 410
            error_message: Invitation has expired

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 400
            error_message: Validation failed

    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 422
            error_message: Name can't be blank

tags:
  - name: Auth - Registration
    description: Shopkeeper sign-up, account update, and account deletion
  - name: Auth - Sessions
    description: Shopkeeper sign-in and sign-out
  - name: Auth - Confirmation
    description: Email confirmation for shopkeeper accounts
  - name: Auth - Password Reset
    description: Forgot password and reset password flow
  - name: Permissions
    description: Retrieve permissions and app configuration metadata
  - name: Me
    description: Current shopkeeper profile actions
  - name: Account
    description: Current shopkeeper account settings (password)
  - name: Shops
    description: CRUD operations on shops
  - name: Item Tags
    description: CRUD and state operations on item tags within shops
  - name: Accounts
    description: CRUD operations on accounts (organizations)
  - name: Members
    description: Manage account members (accounts_shopkeepers)
  - name: Invitations
    description: Manage account invitations (scoped to an account)
  - name: Accounts Invitations
    description: Accept or reject invitations by token (top-level)

paths:
  # ──────────────── Auth - Registration ────────────────
  /shopkeeper_auth:
    post:
      operationId: signUp
      summary: Register a new shopkeeper
      tags: [Auth - Registration]
      security: []
      servers:
        - url: /
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '200':
          description: Shopkeeper registered (confirmation email sent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopkeeperSignIn'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    patch:
      operationId: updateAuthAccount
      summary: Update shopkeeper account info
      tags: [Auth - Registration]
      servers:
        - url: /
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateAuthRequest'
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopkeeperSignIn'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      operationId: deleteAuthAccount
      summary: Delete shopkeeper account
      tags: [Auth - Registration]
      servers:
        - url: /
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ──────────────── Auth - Sessions ────────────────
  /shopkeeper_auth/sign_in:
    post:
      operationId: signIn
      summary: Sign in a shopkeeper
      tags: [Auth - Sessions]
      security: []
      servers:
        - url: /
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Signed in successfully
          headers:
            access-token:
              schema:
                type: string
              description: Authentication token
            client:
              schema:
                type: string
              description: Client identifier
            uid:
              schema:
                type: string
              description: User email
            expiry:
              schema:
                type: string
              description: Token expiry timestamp
            token-type:
              schema:
                type: string
              description: Always "Bearer"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopkeeperSignIn'
        '401':
          description: Not confirmed or bad credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                not_confirmed:
                  value:
                    code: 401
                    error_message: devise_token_auth.sessions.not_confirmed
                bad_credentials:
                  value:
                    code: 401
                    error_message: devise_token_auth.sessions.bad_credentials

  /shopkeeper_auth/sign_out:
    delete:
      operationId: signOut
      summary: Sign out a shopkeeper
      tags: [Auth - Sessions]
      servers:
        - url: /
      responses:
        '200':
          description: Signed out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 404
                error_message: devise_token_auth.sessions.user_not_found

  # ──────────────── Auth - Confirmation ────────────────
  /shopkeeper_auth/confirmation:
    post:
      operationId: resendConfirmation
      summary: Resend confirmation email
      tags: [Auth - Confirmation]
      security: []
      servers:
        - url: /
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmationRequest'
      responses:
        '200':
          description: Confirmation email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '401':
          description: Missing email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 401
                error_message: devise_token_auth.confirmations.missing_email
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 404
                error_message: devise_token_auth.confirmations.user_not_found

  # ──────────────── Auth - Password Reset ────────────────
  /shopkeeper_auth/password:
    post:
      operationId: forgotPassword
      summary: Request a password reset email
      tags: [Auth - Password Reset]
      security: []
      servers:
        - url: /
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Password reset email sent (or paranoid response)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Missing email or redirect URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_email:
                  value:
                    code: 401
                    error_message: devise_token_auth.passwords.missing_email
                missing_redirect_url:
                  value:
                    code: 401
                    error_message: devise_token_auth.passwords.missing_redirect_url
        '422':
          description: Redirect URL not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 422
                error_message: devise_token_auth.passwords.not_allowed_redirect_url

    patch:
      operationId: resetPassword
      summary: Reset password with token
      tags: [Auth - Password Reset]
      security: []
      servers:
        - url: /
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────── Permissions ────────────────
  /permissions:
    get:
      operationId: listPermissions
      summary: List permissions with app config metadata
      tags: [Permissions]
      responses:
        '200':
          description: Permissions list with meta
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Permission'
                  meta:
                    type: object
                    properties:
                      ios_app_version:
                        type: string
                      android_app_version:
                        type: string
                      should_update_privacy:
                        type: boolean
                      should_update_terms:
                        type: boolean
                      maximum_queue_number_length:
                        type: integer
                      shop_limit_count:
                        type: integer
                      account_limit_count:
                        type: integer
                      accounts_shopkeeper_limit_count:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────── Me ────────────────
  /me/update_confirmed_privacy_version:
    patch:
      operationId: updateConfirmedPrivacyVersion
      summary: Confirm current privacy version
      tags: [Me]
      responses:
        '200':
          description: Privacy version confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /me/update_confirmed_terms_version:
    patch:
      operationId: updateConfirmedTermsVersion
      summary: Confirm current terms version
      tags: [Me]
      responses:
        '200':
          description: Terms version confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────── Account / Password ────────────────
  /account/password:
    patch:
      operationId: updatePassword
      summary: Update current shopkeeper password
      tags: [Account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordUpdateRequest'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ──────────────── Shops ────────────────
  /shops:
    get:
      operationId: listShops
      summary: List shops for current account
      tags: [Shops]
      responses:
        '200':
          description: Shop list with meta
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Shop'
                  meta:
                    type: object
                    properties:
                      limit_count:
                        type: integer
                      created_shops_count:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createShop
      summary: Create a new shop
      tags: [Shops]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShopCreateRequest'
      responses:
        '201':
          description: Shop created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Shop'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /shops/{shopId}:
    parameters:
      - name: shopId
        in: path
        required: true
        schema:
          type: string
